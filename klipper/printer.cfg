# ==============================================================
# Minimal printer.cfg for TradRack-only Klipper Setup
# ==============================================================
# This printer.cfg is for a Raspberry Pi 4 running Klipper ONLY
# to control the TradRack MMU via the Fly-ECRF-V2 board.
#
# There is no actual printer attached to this Klipper instance —
# the BambuLab P1S is a separate machine on the network.
# We use Klipper's "virtual printer" mode (no heaters, no axes)
# purely to run Happy Hare for the TradRack.
# ==============================================================

# The Fly-ECRF-V2 board is the real MCU for TradRack.
# Update this serial path after flashing Klipper firmware on the ECRF-V2:
#   ls /dev/serial/by-id/
# [mcu mmu]
# serial: /dev/serial/by-id/usb-Klipper_stm32f072_XXXXX-if00
# restart_method: command

# Host MCU (Linux process on the Pi)
[mcu]
serial: /tmp/klipper_host_mcu

# Minimal printer definition (required by Klipper even if no printer)
[printer]
kinematics: none
max_velocity: 1
max_accel: 1

# Virtual SD card (required by Moonraker)
[virtual_sdcard]
path: ~/printer_data/gcodes

# Dummy extruder (required by Happy Hare for filament loading logic)
# No real extruder is attached — the P1S handles its own extrusion.
# Uncomment when Happy Hare includes are enabled and ECRF-V2 is connected.
# Uses host MCU GPIO for heater (no real heater attached).
# [extruder]
# step_pin: mcu:gpio5
# dir_pin: mcu:gpio6
# enable_pin: !mcu:gpio13
# microsteps: 16
# rotation_distance: 22.67
# nozzle_diameter: 0.400
# filament_diameter: 1.750
# heater_pin: mcu:gpio19
# sensor_type: temperature_host
# control: watermark
# min_temp: 0
# max_temp: 300
# min_extrude_temp: 0

# Include Happy Hare MMU configuration
# Uncomment these after installing Happy Hare:
# [include mmu/base/*.cfg]
# [include mmu/optional/client_macros.cfg]

# Include Fly-ECRF-V2 hardware reference (see comments in this file)
# The actual pin config goes in mmu/mmu_hardware.cfg
# [include fly-ecrf-v2-tradrack.cfg]
