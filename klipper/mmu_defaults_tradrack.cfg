# ============================================================
# TradRack 1.0e — Known-Good Default Settings
# ============================================================
#
# These values are taken from a working Tradrack 1.0 setup with:
#   - Mellow EASY-BRD-CAN v2 board (Happy Hare "Not in list" install)
#   - Binky encoder (12-tooth disc)
#   - 50:17 gear ratio (Bondtech 5mm drive gears)
#   - NEMA14 gear motor, NEMA17 selector motor
#
# setup.sh applies these automatically. This file is for reference
# only — it is NOT included by Klipper.
#
# Source: Working Voron TradRack, Happy Hare v3.42
# ============================================================

# ── Servo (mmu_parameters.cfg) ──────────────────────────────
# servo_up_angle: 145           # Tradrack default (filament free to move)
# servo_down_angle: 1           # Tradrack default (grips filament)
# servo_duration: 0.4
# servo_dwell: 0.5
# servo_always_active: 1        # TradRack servo requires always-on
# servo_active_down: 0
# servo_buzz_gear_on_down: 0

# ── Servo hardware (mmu_hardware.cfg) ───────────────────────
# [mmu_servo selector_servo]
# maximum_servo_angle: 131
# minimum_pulse_width: 0.00070
# maximum_pulse_width: 0.00220

# ── Gear stepper ────────────────────────────────────────────
# [tmc2209 stepper_mmu_gear]
# run_current: 1.27             # NEMA14 motor
# hold_current: 0.2
# sense_resistor: 0.110
# stealthchop_threshold: 0      # Spreadcycle for torque
#
# [stepper_mmu_gear]
# rotation_distance: 22.7316868 # Bondtech 5mm, calibrate with MMU_CALIBRATE_GEAR
# gear_ratio: 50:17             # TradRack specific
# microsteps: 16
# full_steps_per_rotation: 200

# ── Selector stepper ────────────────────────────────────────
# [tmc2209 stepper_mmu_selector]
# run_current: 0.63             # NEMA17 motor
# hold_current: 0.2
# sense_resistor: 0.110
# stealthchop_threshold: 100    # Stealthchop for selector
#
# [stepper_mmu_selector]
# rotation_distance: 40
# microsteps: 16
# gear_ratio: 1:1
# full_steps_per_rotation: 200

# ── Encoder ─────────────────────────────────────────────────
# encoder_resolution: 1.0       # Binky 12-tooth disc (calibrate with MMU_CALIBRATE_ENCODER)
# desired_headroom: 5.0
# average_samples: 4
# flowrate_samples: 20

# ── Gate loading (mmu_parameters.cfg) ───────────────────────
# gate_homing_max: 70
# gate_parking_distance: 43     # Calibrated — may need adjustment per build
# gate_endstop_to_encoder: 10
# gate_unload_buffer: 50
# gate_load_retries: 2
# gate_autoload: 1

# ── Movement speeds (mmu_parameters.cfg) ────────────────────
# gear_from_spool_speed: 80
# gear_from_spool_accel: 100
# gear_from_buffer_speed: 150
# gear_from_buffer_accel: 400
# gear_unload_speed: 80
# gear_unload_accel: 100
# gear_short_move_speed: 80
# gear_homing_speed: 50
# selector_move_speed: 200
# selector_homing_speed: 60
# selector_touch_speed: 80

# ── Sync / motor (mmu_parameters.cfg) ───────────────────────
# sync_to_extruder: 1
# sync_gear_current: 50
# sync_form_tip: 1
# sync_feedback_enabled: 0
# has_filament_buffer: 0

# ── Tip forming (mmu_parameters.cfg) ────────────────────────
# force_form_tip_standalone: 1  # Always use standalone tip forming
# form_tip_macro: _MMU_FORM_TIP # Use _MMU_CUT_TIP if you have a filament cutter

# ── Misc (mmu_parameters.cfg) ──────────────────────────────
# timeout_pause: 72000
# disable_heater: 600
# default_extruder_temp: 200
# selector_touch_enabled: 0     # Physical endstop, not stallguard
# flowguard_enabled: 1
