# ==============================================================
# Fly-ECRF-V2 + TradRack Klipper Configuration
# ==============================================================
# Pin mappings for the Fly-ECRF-V2 board driving a TradRack MMU.
# This file is included by printer.cfg and referenced by Happy Hare.
#
# The Fly-ECRF-V2 has:
#   - 2 stepper drivers (for selector and gear motors)
#   - TMC2209 UART drivers (directly on-board)
#   - Endstop inputs
#   - Servo output
#   - Filament sensor inputs
#
# Adjust pin names if your board revision differs.
# Refer to: https://mellow-3d.github.io/fly_ecrf_v2.html
# ==============================================================

# NOTE: This MCU section is managed by Happy Hare's mmu_hardware.cfg.
# The [mmu_machine] section in mmu_hardware.cfg replaces the need for
# a manual [mcu mmu] definition. Ensure the serial path is correct there.
#
# If you need a manual MCU definition (e.g., for testing without Happy Hare):
# [mcu mmu]
# serial: /dev/serial/by-id/usb-Klipper_stm32f072_XXXXX-if00
# restart_method: command

# ==============================================================
# Stepper Configuration (referenced by Happy Hare mmu_hardware.cfg)
# ==============================================================
# Happy Hare expects these pin definitions in its own config files.
# Below are the correct Fly-ECRF-V2 pin assignments to use in
# ~/printer_data/config/mmu/mmu_hardware.cfg

# Selector stepper (moves the selector carriage along the TradRack rail)
# In mmu_hardware.cfg [stepper_mmu_selector]:
#   step_pin: mmu:PA3
#   dir_pin: mmu:PA2
#   enable_pin: !mmu:PA15
#   endstop_pin: ^mmu:PA0    # Selector home endstop
#   microsteps: 16
#   rotation_distance: 40    # Adjust for your TradRack gate spacing
#   full_steps_per_rotation: 200

# Gear stepper (feeds filament in/out of TradRack)
# In mmu_hardware.cfg [stepper_mmu_gear]:
#   step_pin: mmu:PA7
#   dir_pin: mmu:PA6
#   enable_pin: !mmu:PA5
#   microsteps: 16
#   rotation_distance: 22.67  # Adjust for your gear/BMG clone
#   full_steps_per_rotation: 200

# ==============================================================
# TMC2209 UART Configuration
# ==============================================================
# In mmu_hardware.cfg:

# [tmc2209 stepper_mmu_selector]
#   uart_pin: mmu:PA10
#   run_current: 0.6
#   stealthchop_threshold: 999999

# [tmc2209 stepper_mmu_gear]
#   uart_pin: mmu:PA9
#   run_current: 0.5
#   stealthchop_threshold: 0

# ==============================================================
# Servo Configuration (for filament grip/release)
# ==============================================================
# In mmu_hardware.cfg [mmu_servo mmu_servo]:
#   pin: mmu:PA1
#   minimum_pulse_width: 0.000544
#   maximum_pulse_width: 0.002400

# ==============================================================
# Filament Sensors (optional, if installed on TradRack gates)
# ==============================================================
# If you have filament sensors at each gate:
# [filament_switch_sensor mmu_gate_0]
#   switch_pin: ^mmu:PB0
#   pause_on_runout: False
#
# [filament_switch_sensor mmu_gate_1]
#   switch_pin: ^mmu:PB1
#   pause_on_runout: False
#
# ... etc for each gate

# ==============================================================
# IMPORTANT NOTES
# ==============================================================
# 1. The pin names above use the "mmu:" prefix which corresponds
#    to the [mcu mmu] definition (or [mmu_machine] in Happy Hare).
#
# 2. Do NOT define these steppers directly in printer.cfg.
#    Happy Hare manages them through its own config system.
#    The pin assignments go in mmu_hardware.cfg.
#
# 3. After editing mmu_hardware.cfg, restart Klipper:
#    sudo systemctl restart klipper
#
# 4. Verify with: MMU_STATUS (from Moonraker/console)
