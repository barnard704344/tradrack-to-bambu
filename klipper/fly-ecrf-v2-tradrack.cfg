# ==============================================================
# Fly-ECRF-V2 Pin Reference for TradRack + Happy Hare
# ==============================================================
# Pin mapping from the official Fly-ECRF-V2 pinout diagram.
# MCU: RP2040 with on-board TMC2209 drivers.
#
# This file documents the correct pin assignments. The actual
# pin configuration lives in:
#   ~/printer_data/config/mmu/base/mmu.cfg  (pin aliases)
#
# RP2040 GPIO pin mapping (Fly-ECRF-V2):
#   Pins are referenced as gpio0, gpio1, ... gpio29.
#
# Refer to:
#   https://mellow.klipper.cn/en/docs/ProductDoc/ToolBoard/fly-ercf/ercfv2/cfg
#   https://mellow.klipper.cn/en/docs/ProductDoc/ToolBoard/fly-ercf/ercfv2/wiring
#
# To flash Klipper firmware for USB mode, run:
#   cd ~/tradrack-to-bambu && ./scripts/flash-ecrf-v2.sh
# ==============================================================

# ==============================================================
# Selector Stepper (moves selector carriage along TradRack rail)
# ==============================================================
#   STEP:     gpio4
#   DIR:      gpio3
#   EN:       gpio5
#   UART:     gpio2
#   DIAG:     gpio20

# ==============================================================
# Gear Stepper (feeds filament in/out)
# ==============================================================
#   STEP:     gpio7
#   DIR:      gpio8
#   EN:       gpio6
#   UART:     gpio9
#   DIAG:     gpio15

# ==============================================================
# Servo (filament grip/release)
# ==============================================================
#   SERVO:    gpio21

# ==============================================================
# Endstop (selector home)
# ==============================================================
#   ENDSTOP:  gpio20  (shared with Selector DIAG header)

# ==============================================================
# Encoder (Binky 12-tooth disc — filament motion sensor)
# ==============================================================
#   ENCODER:  gpio15  (shared with Gear DIAG header)
#
#   The Binky encoder PCB connects to the Gear DIAG header.
#   Both MMU_GEAR_DIAG and MMU_ENCODER map to gpio15.
#   Default resolution: 1.0 mm/pulse (24 / (2 * 12))
#   Used for: gate homing, clog detection, flow monitoring, runout

# ==============================================================
# Neopixel / RGB LEDs
# ==============================================================
#   NEOPIXEL: gpio14

# ==============================================================
# Happy Hare pin aliases (paste into mmu/base/mmu.cfg)
# ==============================================================
# Replace the {placeholder} values in [board_pins mmu] with:
#
#   MMU_GEAR_STEP=gpio7,
#   MMU_GEAR_DIR=gpio8,
#   MMU_GEAR_ENABLE=gpio6,
#   MMU_GEAR_UART=gpio9,
#   MMU_GEAR_DIAG=gpio15,
#
#   MMU_SEL_STEP=gpio4,
#   MMU_SEL_DIR=gpio3,
#   MMU_SEL_ENABLE=gpio5,
#   MMU_SEL_UART=gpio2,
#   MMU_SEL_DIAG=gpio20,
#   MMU_SEL_ENDSTOP=gpio20,
#   MMU_SEL_SERVO=gpio21,
#
#   MMU_ENCODER=gpio15,
#   MMU_NEOPIXEL=gpio14,
