# ==============================================================
# Fly-ECRF-V2 Pin Reference for TradRack + Happy Hare
# ==============================================================
# Pin mapping from the official Fly-ECRF-V2 pinout diagram.
# MCU: STM32F072 with on-board TMC2209 drivers.
#
# This file documents the correct pin assignments. The actual
# pin configuration lives in:
#   ~/printer_data/config/mmu/base/mmu.cfg  (pin aliases)
#
# GPIO-to-STM32 mapping (Fly convention):
#   gpio0-15  = PA0-PA15
#   gpio16-31 = PB0-PB15
#
# Refer to: https://mellow-3d.github.io/fly_ecrf_v2.html
#
# Wiring diagrams & DIP switch setup (USB/CAN mode):
#   https://mellow.klipper.cn/en/docs/ProductDoc/ToolBoard/fly-ercf/ercfv2/wiring
#
# To flash Klipper firmware for USB mode, run:
#   cd ~/tradrack-to-bambu && ./scripts/flash-ecrf-v2.sh
# ==============================================================

# ==============================================================
# Selector Stepper (moves selector carriage along TradRack rail)
# ==============================================================
#   STEP:  gpio4  = PA4
#   DIR:   gpio3  = PA3
#   EN:    gpio5  = PA5
#   UART:  gpio2  = PA2
#   DIAG:  gpio20 = PB4

# ==============================================================
# Gear Stepper (feeds filament in/out)
# ==============================================================
#   STEP:  gpio7  = PA7
#   DIR:   gpio8  = PA8
#   EN:    gpio6  = PA6
#   UART:  gpio9  = PA9
#   DIAG:  gpio15 = PA15

# ==============================================================
# Servo (filament grip/release)
# ==============================================================
#   SERVO: gpio21 = PB5

# ==============================================================
# Endstop (selector home)
# ==============================================================
#   ENDSTOP: gpio20 = PB4  (shared with Selector DIAG header)

# ==============================================================
# Encoder (filament movement sensor, Binky-style)
# ==============================================================
#   ENCODER: gpio15 = PA15  (shared with Gear DIAG header)

# ==============================================================
# Neopixel / RGB LEDs
# ==============================================================
#   NEOPIXEL: gpio14 = PA14

# ==============================================================
# General-purpose header pins (accent connectors on PCB)
# ==============================================================
#   P10 = PA10    P22 = PB6
#   P11 = PA11    P23 = PB7
#   P12 = PA12    P24 = PB8
#   P13 = PA13    P25 = PB9
#                 P26 = PB10
#                 P27 = PB11
#                 P28 = PB12
#                 P29 = PB13

# ==============================================================
# Happy Hare pin aliases (paste into mmu/base/mmu.cfg)
# ==============================================================
# Replace the {placeholder} values in [board_pins mmu] with:
#
#   MMU_GEAR_STEP=PA7,
#   MMU_GEAR_DIR=PA8,
#   MMU_GEAR_ENABLE=PA6,
#   MMU_GEAR_UART=PA9,
#   MMU_GEAR_DIAG=PA15,
#
#   MMU_SEL_STEP=PA4,
#   MMU_SEL_DIR=PA3,
#   MMU_SEL_ENABLE=PA5,
#   MMU_SEL_UART=PA2,
#   MMU_SEL_DIAG=PB4,
#   MMU_SEL_ENDSTOP=PB4,
#   MMU_SEL_SERVO=PB5,
#
#   MMU_ENCODER=PA15,
#   MMU_NEOPIXEL=PA14,
