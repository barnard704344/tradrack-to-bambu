<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradRack MMU</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #0f3460;
    --text: #e4e4e4;
    --muted: #8892a4;
    --green: #4ecca3;
    --red: #e74c3c;
    --orange: #f39c12;
    --blue: #3498db;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    min-height: 100vh;
  }
  a { color: var(--green); text-decoration: none; }
  a:hover { text-decoration: underline; }
  h1 {
    font-size: 1.4em;
    margin-bottom: 16px;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  h1 .dot.ok { background: var(--green); }
  h1 .dot.err { background: var(--red); }
  .nav { margin-bottom: 16px; font-size: 0.9em; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border-radius: 8px;
    padding: 16px;
    border: 1px solid var(--accent);
  }
  .card h2 {
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 12px;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 6px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.95em;
  }
  .row .label { color: var(--muted); }
  .row .value { font-weight: 600; }
  .ok { color: var(--green); }
  .err { color: var(--red); }
  .warn { color: var(--orange); }
  .blue { color: var(--blue); }

  /* Gate table */
  .gate-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88em;
    margin-top: 8px;
  }
  .gate-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 600;
    padding: 4px 8px;
    border-bottom: 1px solid var(--accent);
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .gate-table td {
    padding: 6px 8px;
    border-bottom: 1px solid rgba(15,52,96,0.4);
  }
  .gate-table tr.active { background: rgba(78,204,163,0.08); }
  .color-swatch {
    display: inline-block;
    width: 16px; height: 16px;
    border-radius: 3px;
    border: 1px solid var(--muted);
    vertical-align: middle;
  }
  .gate-status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .gate-status-dot.loaded { background: var(--green); }
  .gate-status-dot.available { background: var(--blue); }
  .gate-status-dot.empty { background: var(--muted); }
  .gate-status-dot.unknown { background: var(--orange); }

  /* Sensors */
  .sensor-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .sensor-chip {
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.8em;
    font-weight: 600;
    border: 1px solid var(--accent);
  }
  .sensor-chip.on { background: var(--green); color: var(--bg); border-color: var(--green); }
  .sensor-chip.off { background: var(--accent); color: var(--muted); }
  .sensor-chip.disabled { opacity: 0.3; }

  /* Controls */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .btn {
    background: var(--accent);
    border: 1px solid var(--muted);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.85em;
    font-weight: 600;
    transition: border-color 0.2s;
  }
  .btn:hover { border-color: var(--green); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.danger { border-color: var(--red); }
  .btn.danger:hover { background: var(--red); color: white; }
  .btn.primary { background: var(--green); color: var(--bg); border-color: var(--green); }
  .btn.primary:hover { opacity: 0.85; }

  select {
    background: var(--accent);
    border: 1px solid var(--muted);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 0.85em;
  }

  /* Progress bar for bowden */
  .bowden-bar {
    background: var(--accent);
    border-radius: 4px;
    height: 8px;
    margin-top: 4px;
    overflow: hidden;
  }
  .bowden-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 4px;
    transition: width 0.3s;
  }

  .updated {
    font-size: 0.75em;
    color: var(--muted);
    text-align: right;
    margin-top: 12px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 0.9em;
    font-weight: 600;
    z-index: 2000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: var(--green); color: var(--bg); }
  .toast.error { background: var(--red); color: white; }

  .disconnected-overlay {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 1.1em;
  }
</style>
</head>
<body>

<div class="nav"><a href="/">&larr; Bridge Dashboard</a></div>

<h1>
  <span class="dot" id="conn-dot"></span>
  TradRack MMU
</h1>

<div id="content"></div>
<div class="updated" id="updated">—</div>

<div class="toast" id="toast"></div>

<script>
var numGates = 0;

function toast(msg, ok) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (ok ? 'success' : 'error');
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function mmuCmd(endpoint, body) {
  return fetch('/api/mmu/' + endpoint, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: body ? JSON.stringify(body) : '{}'
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    toast(endpoint + (d.ok ? ' OK' : ' FAILED'), d.ok);
    return d;
  })
  .catch(function() { toast(endpoint + ' error', false); });
}

function gateStatusLabel(s) {
  if (s === -1) return ['empty', 'Empty'];
  if (s === 0) return ['unknown', 'Unknown'];
  if (s === 1) return ['available', 'Available'];
  if (s === 2) return ['loaded', 'Loaded'];
  return ['unknown', '?'];
}

function renderConnected(d) {
  var filClass = d.filament === 'Loaded' ? 'ok' : (d.filament === 'Unloaded' ? 'err' : 'warn');
  var actionClass = d.action === 'Idle' ? 'ok' : 'warn';
  var pauseHtml = d.reason_for_pause
    ? '<div class="row"><span class="label">Pause Reason</span><span class="value err">' + d.reason_for_pause + '</span></div>'
    : '';

  // Build gate options
  var selOpts = '';
  for (var i = 0; i < d.num_gates; i++) {
    selOpts += '<option value="' + i + '">T' + i;
    if (d.gates[i] && d.gates[i].material) selOpts += ' (' + d.gates[i].material + ')';
    selOpts += '</option>';
  }

  var html = '<div class="grid">';

  // Status card
  html += '<div class="card"><h2>Status</h2>';
  html += '<div class="row"><span class="label">Action</span><span class="value ' + actionClass + '">' + d.action + '</span></div>';
  html += '<div class="row"><span class="label">Tool</span><span class="value">' + (d.tool >= 0 ? 'T' + d.tool : 'None') + '</span></div>';
  html += '<div class="row"><span class="label">Gate</span><span class="value">' + (d.gate >= 0 ? d.gate : '—') + '</span></div>';
  html += '<div class="row"><span class="label">Filament</span><span class="value ' + filClass + '">' + d.filament + '</span></div>';
  html += '<div class="row"><span class="label">Position</span><span class="value">' + d.filament_position + ' mm</span></div>';
  html += '<div class="row"><span class="label">Servo</span><span class="value">' + d.servo + '</span></div>';
  html += '<div class="row"><span class="label">Homed</span><span class="value ' + (d.is_homed ? 'ok' : 'err') + '">' + (d.is_homed ? 'Yes' : 'No') + '</span></div>';
  html += '<div class="row"><span class="label">Sync Drive</span><span class="value">' + (d.sync_drive ? 'Yes' : 'No') + '</span></div>';
  html += '<div class="row"><span class="label">Tool Changes</span><span class="value">' + d.num_toolchanges + '</span></div>';
  html += pauseHtml;
  if (d.bowden_progress >= 0) {
    html += '<div class="row"><span class="label">Bowden</span><span class="value">' + d.bowden_progress + '%</span></div>';
    html += '<div class="bowden-bar"><div class="bowden-fill" style="width:' + d.bowden_progress + '%"></div></div>';
  }
  html += '</div>';

  // Encoder card
  html += '<div class="card"><h2>Encoder</h2>';
  html += '<div class="row"><span class="label">Position</span><span class="value">' + d.encoder.position + ' mm</span></div>';
  html += '<div class="row"><span class="label">Flow Rate</span><span class="value blue">' + d.encoder.flow_rate + '%</span></div>';
  html += '<div class="row"><span class="label">Headroom</span><span class="value">' + d.encoder.headroom + ' mm</span></div>';
  html += '<div class="row"><span class="label">Enabled</span><span class="value ' + (d.encoder.enabled ? 'ok' : 'err') + '">' + (d.encoder.enabled ? 'Yes' : 'No') + '</span></div>';

  // Sensors
  html += '<h2 style="margin-top:16px">Sensors</h2>';
  html += '<div class="sensor-grid">';
  var sKeys = Object.keys(d.sensors || {});
  if (sKeys.length === 0) { html += '<span class="label">No sensors</span>'; }
  for (var si = 0; si < sKeys.length; si++) {
    var sv = d.sensors[sKeys[si]];
    var cls = sv === null ? 'disabled' : (sv ? 'on' : 'off');
    var label = sKeys[si].replace(/_/g, ' ');
    html += '<span class="sensor-chip ' + cls + '">' + label + '</span>';
  }
  html += '</div></div>';

  // Controls card
  html += '<div class="card"><h2>Controls</h2>';
  html += '<div class="controls">';
  html += '<button class="btn primary" onclick="mmuCmd(\'home\')">Home</button>';
  html += '<button class="btn" onclick="mmuCmd(\'load\')">Load</button>';
  html += '<button class="btn" onclick="mmuCmd(\'unload\')">Unload</button>';
  html += '<button class="btn" onclick="mmuCmd(\'eject\')">Eject</button>';
  html += '<button class="btn" onclick="mmuCmd(\'servo\',{pos:\'up\'})">Servo Up</button>';
  html += '<button class="btn" onclick="mmuCmd(\'servo\',{pos:\'down\'})">Servo Down</button>';
  html += '<button class="btn danger" onclick="mmuCmd(\'recover\')">Recover</button>';
  html += '</div>';
  html += '<div class="controls" style="margin-top:10px">';
  html += '<select id="sel-tool">' + selOpts + '</select>';
  html += '<button class="btn" onclick="mmuCmd(\'select\',{gate:parseInt(document.getElementById(\'sel-tool\').value)})">Select Gate</button>';
  html += '<button class="btn primary" onclick="mmuCmd(\'change_tool\',{tool:parseInt(document.getElementById(\'sel-tool\').value)})">Change Tool</button>';
  html += '</div></div>';

  html += '</div>'; // end grid

  // Gate map (full width)
  html += '<div class="card" style="margin-top:12px"><h2>Gate Map</h2>';
  html += '<table class="gate-table"><thead><tr>';
  html += '<th>Gate</th><th>Tool</th><th>Status</th><th>Color</th><th>Material</th><th>Filament</th><th>Temp</th><th>Spool</th>';
  html += '</tr></thead><tbody>';
  for (var gi = 0; gi < d.gates.length; gi++) {
    var g = d.gates[gi];
    var gs = gateStatusLabel(g.status);
    var isActive = gi === d.gate;
    html += '<tr class="' + (isActive ? 'active' : '') + '">';
    html += '<td><strong>' + gi + '</strong></td>';
    html += '<td>' + (g.mapped_tool >= 0 ? 'T' + g.mapped_tool : '—') + '</td>';
    html += '<td><span class="gate-status-dot ' + gs[0] + '"></span>' + gs[1] + '</td>';
    var colorHex = g.color || '';
    if (colorHex && !colorHex.startsWith('#')) colorHex = '#' + colorHex;
    html += '<td>' + (colorHex ? '<span class="color-swatch" style="background:' + colorHex + '"></span>' : '—') + '</td>';
    html += '<td>' + (g.material || '—') + '</td>';
    html += '<td>' + (g.filament_name || '—') + '</td>';
    html += '<td>' + (g.temperature > 0 ? g.temperature + '°C' : '—') + '</td>';
    html += '<td>' + (g.spool_id > 0 ? '#' + g.spool_id : '—') + '</td>';
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  return html;
}

function update() {
  fetch('/api/mmu/status')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var dot = document.getElementById('conn-dot');
      var content = document.getElementById('content');

      if (!d.connected) {
        dot.className = 'dot err';
        content.innerHTML = '<div class="disconnected-overlay">Klipper / Happy Hare not connected<br><small>The MMU controls will appear when Klipper is ready</small></div>';
      } else {
        dot.className = 'dot ok';
        content.innerHTML = renderConnected(d);
      }

      document.getElementById('updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    })
    .catch(function() {
      document.getElementById('conn-dot').className = 'dot err';
      document.getElementById('updated').textContent = 'Connection lost';
    });
}

update();
setInterval(update, 2000);
</script>
</body>
</html>
